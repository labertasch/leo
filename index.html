<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" content="#081228" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Solar Kids" />
    <title>Solar Kids For Leo Teoman Taş</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./assets/icons/icon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="game-stage">
        <div class="playfield">
          <canvas id="gameCanvas" width="1280" height="720" aria-label="Rocket game canvas"></canvas>

          <header class="hud-top">
            <h1>Solar Kids For Leo Teoman Taş</h1>
            <div class="hud-stats">
              <span>Level: <strong id="levelCount">1</strong></span>
              <span>Lives: <strong id="livesCount">3</strong></span>
              <span>Stars: <strong id="starsCount">0</strong></span>
              <span>Friendly Bumps: <strong id="bumpsCount">0</strong></span>
            </div>
          </header>
          <div class="motivation" id="motivationMsg" aria-live="polite"></div>

          <section class="panel" id="startPanel">
            <h2>Fly To The Stars</h2>
            <p>Keyboard: Arrow keys or WASD</p>
            <p>Mouse: Move pointer and rocket follows it</p>
            <p>Collect stars, avoid asteroids, and wave to every planet.</p>
            <button id="startBtn">Start Mission</button>
          </section>
        </div>
      </section>
    </main>

    <script src="./game.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
